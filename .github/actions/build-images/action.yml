name: Build Seta images
description: |
  Multi-arch buildx for seta-server and seta-web. Used by release.yml and edge.yml.
  Logs into GHCR with GITHUB_TOKEN. Caller decides whether to push.

inputs:
  image:
    description: 'Which image to build: seta-server or seta-web'
    required: true
  dockerfile:
    description: 'Dockerfile path (relative to repo root)'
    required: true
  tags:
    description: 'Newline-separated list of full image refs to tag'
    required: true
  labels:
    description: 'Newline-separated list of OCI labels'
    required: false
    default: ''
  platforms:
    description: 'buildx platforms; default linux/amd64,linux/arm64'
    required: false
    default: 'linux/amd64,linux/arm64'
  push:
    description: '"true" to push to the registry; "false" to build only'
    required: false
    default: 'false'
  cache-ref:
    description: 'Registry ref for build cache (e.g. ghcr.io/org/seta-server:buildcache)'
    required: true

outputs:
  digest:
    description: 'sha256 digest of the pushed multi-arch manifest list'
    value: ${{ steps.build.outputs.digest }}
  metadata:
    description: 'JSON metadata emitted by build-push-action'
    value: ${{ steps.build.outputs.metadata }}

runs:
  using: composite
  steps:
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

    - name: Set up Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

    - name: Log in to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: Build and (maybe) push
      id: build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
      with:
        context: .
        file: ${{ inputs.dockerfile }}
        platforms: ${{ inputs.platforms }}
        push: ${{ inputs.push }}
        tags: ${{ inputs.tags }}
        labels: ${{ inputs.labels }}
        cache-from: type=registry,ref=${{ inputs.cache-ref }}
        cache-to: type=registry,ref=${{ inputs.cache-ref }},mode=max
        provenance: mode=max
        sbom: false
